<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Purposed4 Chat</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f6f7fb;
      color: #1f2937;
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 24px;
    }

    .hero {
      text-align: center;
      margin-bottom: 20px;
    }

    .hero h1 {
      margin-bottom: 8px;
    }

    .hero p {
      margin: 0;
      line-height: 1.5;
      color: #4b5563;
    }

    .chat {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
    }

    .messages {
      height: 480px;
      overflow-y: auto;
      padding: 18px;
      background: #fcfcfd;
    }

    .msg {
      max-width: 80%;
      margin-bottom: 14px;
      padding: 12px 14px;
      border-radius: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .msg.user {
      margin-left: auto;
      background: #111827;
      color: white;
      border-bottom-right-radius: 4px;
    }

    .msg.ai {
      background: #eef2ff;
      color: #111827;
      border-bottom-left-radius: 4px;
    }

    .composer {
      display: flex;
      gap: 10px;
      padding: 14px;
      border-top: 1px solid #e5e7eb;
      background: white;
    }

    .composer textarea {
      flex: 1;
      resize: none;
      min-height: 52px;
      max-height: 140px;
      padding: 12px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font: inherit;
    }

    .composer button {
      border: 0;
      border-radius: 10px;
      padding: 0 18px;
      background: #111827;
      color: white;
      font: inherit;
      cursor: pointer;
    }

    .composer button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1>Purposed4</h1>
      <p>
        A guided space for clarity, direction, and purpose.
      </p>
    </div>

    <div class="chat">
      <div id="messages" class="messages"></div>

      <div class="composer">
        <textarea id="input" placeholder="Type your message here..."></textarea>
        <button id="sendBtn">Send</button>
      </div>
    </div>
  </div>

  <script>
    const messages = document.getElementById("messages");
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("sendBtn");

    function addMessage(text, type) {
      const div = document.createElement("div");
      div.className = `msg ${type}`;
      div.textContent = text;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;

      addMessage(text, "user");
      input.value = "";
      sendBtn.disabled = true;

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ message: text })
        });

        const data = await res.json();

        if (!res.ok) {
          addMessage(`Error: ${data.error || "Something went wrong."}`, "ai");
        } else {
          addMessage(data.reply, "ai");
        }
      } catch (error) {
        addMessage("Error: Unable to reach the server.", "ai");
      } finally {
        sendBtn.disabled = false;
        input.focus();
      }
    }

    sendBtn.addEventListener("click", sendMessage);

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    addMessage(
      "Welcome to Purposed4.\n\nTake a moment to think about your current season of life.\n\nWhat part of your life feels like it could use more clarity right now?",
      "ai"
    );
  </script>
</body>
</html>
